  <!-- Small cross on right page -->
  <line x1="22" y1="13" x2="22" y2="19" stroke="#10a37f" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="19.5" y1="15.5" x2="24.5" y2="15.5" stroke="#10a37f" stroke-width="1.5" stroke-linecap="round"/>
</svg>
